<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACI Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2d3148;
    --text: #e2e8f0; --text-muted: #7b82a0; --text-dim: #4a5068; --accent: #7c6ff7;
    --r-bg: #0f4f2a; --r-text: #4ade80; --r-border: #16a34a;
    --a-bg: #4d2f00; --a-text: #fb923c; --a-border: #c2410c;
    --c-bg: #0f2d4f; --c-text: #60a5fa; --c-border: #1d4ed8;
    --i-bg: #1e2035; --i-text: #94a3b8; --i-border: #334155;
    --warn-r: #3f1515; --warn-a: #3f2a10;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  header { height: 56px; min-height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
  .header-client { font-size: 16px; font-weight: 700; }
  .header-sub { flex: 1; }
  .header-title { font-size: 12px; color: var(--text-muted); }
  .header-meta { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .header-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; }
  .header-btn:hover { color: var(--text); border-color: var(--accent); }
  .body { display: flex; flex: 1; overflow: hidden; }
  .left-panel { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 10px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .left-label { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; padding: 4px 6px 8px; }
  .role-card { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; background: var(--bg); }
  .role-card:hover, .role-card.active { border-color: var(--accent); background: var(--surface2); }
  .role-title { font-weight: 600; font-size: 12px; line-height: 1.3; }
  .role-dept { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .role-person { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-style: italic; }
  .role-email { font-size: 10px; color: var(--accent); margin-top: 1px; }
  .role-badges { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .rb { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; }
  .rb-R { background: var(--r-bg); color: var(--r-text); border: 1px solid var(--r-border); }
  .rb-A { background: var(--a-bg); color: var(--a-text); border: 1px solid var(--a-border); }
  .rb-C { background: var(--c-bg); color: var(--c-text); border: 1px solid var(--c-border); }
  .rb-I { background: var(--i-bg); color: var(--i-text); border: 1px solid var(--i-border); }
  .right-panel { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .matrix-wrap { flex: 1; overflow: auto; padding: 16px; }
  .matrix-table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
  .matrix-table th:first-child, .matrix-table td:first-child { position: sticky; left: 0; z-index: 2; background: var(--bg); }
  .matrix-table thead th:first-child { z-index: 3; background: var(--surface); }
  .cat-row td { padding: 18px 12px 6px; font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .cat-row td:first-child { padding-left: 0; }
  .matrix-table thead th { position: sticky; top: 0; z-index: 2; background: var(--surface); border-bottom: 2px solid var(--border); padding: 8px 10px; font-size: 10px; font-weight: 600; color: var(--text-muted); text-align: center; white-space: nowrap; cursor: pointer; max-width: 90px; }
  .matrix-table thead th:first-child { text-align: left; min-width: 220px; cursor: default; }
  .matrix-table thead th:hover:not(:first-child), .matrix-table thead th.col-active { color: var(--accent); }
  .col-sub { font-size: 9px; color: var(--text-dim); font-weight: 400; display: block; }
  .cap-row:hover td { background: var(--surface2) !important; }
  .cap-name-cell { padding: 7px 12px 7px 0; font-size: 12px; border-bottom: 1px solid var(--border); white-space: nowrap; min-width: 220px; }
  .cap-warn-r .cap-name-cell { background: var(--warn-r) !important; }
  .cap-warn-a .cap-name-cell { background: var(--warn-a) !important; }
  .raci-cell { padding: 7px 6px; text-align: center; border-bottom: 1px solid var(--border); min-width: 72px; cursor: pointer; }
  .raci-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 24px; border-radius: 5px; font-size: 11px; font-weight: 800; border: 1px solid transparent; }
  .raci-cell:hover .raci-badge { transform: scale(1.12); }
  .raci-badge.R { background: var(--r-bg); color: var(--r-text); border-color: var(--r-border); }
  .raci-badge.A { background: var(--a-bg); color: var(--a-text); border-color: var(--a-border); }
  .raci-badge.C { background: var(--c-bg); color: var(--c-text); border-color: var(--c-border); }
  .raci-badge.I { background: var(--i-bg); color: var(--i-text); border-color: var(--i-border); }
  .raci-badge.empty { background: transparent; color: var(--text-dim); border-color: transparent; font-size: 14px; }
  .inspector { height: 180px; min-height: 180px; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; overflow-y: auto; flex-shrink: 0; display: flex; gap: 24px; }
  .inspector.empty { align-items: center; justify-content: center; }
  .insp-hint { color: var(--text-dim); font-size: 12px; font-style: italic; }
  .insp-col { flex: 1; min-width: 0; }
  .insp-lbl { font-size: 9px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
  .insp-cap-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .insp-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px; }
  .insp-role { font-size: 13px; font-weight: 600; }
  .insp-contact { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .insp-email { color: var(--accent); text-decoration: none; }
  .cmmc-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .cmmc-chip { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: #1a2040; color: #93c5fd; border: 1px solid #1e3a5f; }
  .raci-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 700; margin-top: 4px; }
  .raci-pill.R { background: var(--r-bg); color: var(--r-text); border: 1px solid var(--r-border); }
  .raci-pill.A { background: var(--a-bg); color: var(--a-text); border: 1px solid var(--a-border); }
  .raci-pill.C { background: var(--c-bg); color: var(--c-text); border: 1px solid var(--c-border); }
  .raci-pill.I { background: var(--i-bg); color: var(--i-text); border: 1px solid var(--i-border); }
  .raci-def { font-size: 11px; font-weight: 400; opacity: .8; }
  .coverage-banner { background: #2a1a00; border-bottom: 1px solid #5a3a00; padding: 8px 20px; font-size: 11px; color: #fbbf24; display: none; }
  .coverage-banner.visible { display: block; }
  .legend { display: flex; align-items: center; gap: 12px; padding: 6px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); }
  .legend-dot { width: 20px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <div class="header-sub">
    <div class="header-client" id="hdr-client"></div>
    <div class="header-title">Information Security Responsibility Matrix</div>
  </div>
  <div class="header-meta" id="hdr-meta"></div>
  <button class="header-btn" onclick="exportPNG()">Export PNG</button>
</header>
<div id="coverage-banner" class="coverage-banner"></div>
<div class="body">
  <div class="left-panel" id="role-panel">
    <div class="left-label">Roles</div>
  </div>
  <div class="right-panel">
    <div class="matrix-wrap">
      <table class="matrix-table" id="matrix"></table>
    </div>
    <div id="inspector" class="inspector empty">
      <span class="insp-hint">Click any cell to inspect — role, capability, CMMC controls, and contact info</span>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot rb-R">R</div> Responsible — does the work</div>
      <div class="legend-item"><div class="legend-dot rb-A">A</div> Accountable — owns the outcome</div>
      <div class="legend-item"><div class="legend-dot rb-C">C</div> Consulted — input required</div>
      <div class="legend-item"><div class="legend-dot rb-I">I</div> Informed — kept in the loop</div>
    </div>
  </div>
</div>
<script>
const D = { /* RACI_DATA_PLACEHOLDER */ };

/* ── DOM helper ── */
function mk(tag, cls, txt) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (txt !== undefined) el.textContent = txt;
  return el;
}

/* ── Index ── */
const aMap = {};
for (const a of D.assignments) {
  if (!aMap[a.capability_id]) aMap[a.capability_id] = {};
  aMap[a.capability_id][a.role_id] = a;
}
const capMap = {};
for (const cat of D.categories)
  for (const cap of cat.capabilities)
    capMap[cap.id] = { ...cap, categoryName: cat.name };

const RACI_DEF = {
  R: 'Primary executor of this function.',
  A: 'Owns the outcome — accountable if this function fails.',
  C: 'Must be consulted before decisions are made.',
  I: 'Receives updates; does not need to act.',
};

let activeRoleId = null;
const noCovR = (D.coverage && D.coverage.capabilities_without_R) || [];
const noCovA = (D.coverage && D.coverage.capabilities_without_A) || [];

/* ── Coverage banner ── */
function renderBanner() {
  const b = document.getElementById('coverage-banner');
  const parts = [];
  function names(ids) { return ids.map(id => capMap[id] ? capMap[id].name : id).join(', '); }
  if (noCovR.length) parts.push(noCovR.length + ' missing R: ' + names(noCovR));
  if (noCovA.length) parts.push(noCovA.length + ' missing A: ' + names(noCovA));
  if (parts.length) { b.textContent = '⚠ Coverage gaps — ' + parts.join(' | '); b.classList.add('visible'); }
}

/* ── Role panel ── */
function renderRoles() {
  const panel = document.getElementById('role-panel');
  for (const role of D.roles) {
    const counts = { R: 0, A: 0, C: 0, I: 0 };
    for (const a of D.assignments) if (a.role_id === role.id && counts[a.raci] !== undefined) counts[a.raci]++;

    const card = mk('div', 'role-card');
    card.dataset.roleId = role.id;
    card.appendChild(mk('div', 'role-title', role.title));
    card.appendChild(mk('div', 'role-dept', role.department));
    if (role.person_name) {
      const pn = role.person_name + (role.person_title ? ' · ' + role.person_title : '');
      card.appendChild(mk('div', 'role-person', pn));
    }
    if (role.person_email) {
      const em = mk('div', 'role-email');
      const a = mk('a', '', role.person_email);
      a.href = 'mailto:' + role.person_email;
      a.className = 'insp-email';
      em.appendChild(a);
      card.appendChild(em);
    }
    const badges = mk('div', 'role-badges');
    for (const [k, v] of Object.entries(counts)) {
      if (v) { const b = mk('span', 'rb rb-' + k, v + ' ' + k); badges.appendChild(b); }
    }
    card.appendChild(badges);
    card.addEventListener('click', () => toggleRole(role.id));
    panel.appendChild(card);
  }
}

function toggleRole(roleId) {
  activeRoleId = activeRoleId === roleId ? null : roleId;
  document.querySelectorAll('.role-card').forEach(c => c.classList.toggle('active', c.dataset.roleId === activeRoleId));
  document.querySelectorAll('thead th[data-role-id]').forEach(th => th.classList.toggle('col-active', th.dataset.roleId === activeRoleId));
  document.querySelectorAll('.raci-cell').forEach(c => {
    c.style.opacity = (!activeRoleId || c.dataset.roleId === activeRoleId) ? '1' : '0.2';
  });
}

/* ── Matrix ── */
function shortTitle(t) {
  return t.replace('Chief Information Security Officer', 'CISO')
          .replace('Information System Security Officer', 'ISSO')
          .replace('Systems Administrator', 'SysAdmin')
          .replace('Network Engineer', 'Net Eng')
          .replace('Cloud Administrator', 'Cloud Admin')
          .replace('IT Director / CIO', 'IT Dir')
          .replace('Legal / Contracts', 'Legal')
          .replace(/ \(CISO\)| \(ISSO\)/g, '');
}

function renderMatrix() {
  const table = document.getElementById('matrix');
  const thead = mk('thead');
  const hRow = mk('tr');
  const thCap = mk('th', '', 'Capability Area');
  hRow.appendChild(thCap);
  for (const role of D.roles) {
    const th = mk('th');
    th.dataset.roleId = role.id;
    th.appendChild(mk('span', '', shortTitle(role.title)));
    th.appendChild(mk('span', 'col-sub', role.department));
    th.addEventListener('click', () => toggleRole(role.id));
    hRow.appendChild(th);
  }
  thead.appendChild(hRow);
  table.appendChild(thead);

  const tbody = mk('tbody');
  for (const cat of D.categories) {
    const catRow = mk('tr', 'cat-row');
    const catTd = mk('td', '', cat.name.toUpperCase());
    catTd.colSpan = D.roles.length + 1;
    catRow.appendChild(catTd);
    tbody.appendChild(catRow);

    for (const cap of cat.capabilities) {
      const row = mk('tr', 'cap-row');
      if (noCovR.includes(cap.id)) row.classList.add('cap-warn-r');
      else if (noCovA.includes(cap.id)) row.classList.add('cap-warn-a');

      row.appendChild(mk('td', 'cap-name-cell', cap.name));

      for (const role of D.roles) {
        const assignment = (aMap[cap.id] || {})[role.id];
        const td = mk('td', 'raci-cell');
        td.dataset.capId = cap.id;
        td.dataset.roleId = role.id;
        const badge = mk('span', 'raci-badge ' + (assignment ? assignment.raci : 'empty'),
                         assignment ? assignment.raci : '·');
        td.appendChild(badge);
        if (assignment) td.addEventListener('click', () => showInspector(cap, role, assignment));
        else td.style.cursor = 'default';
        row.appendChild(td);
      }
      tbody.appendChild(row);
    }
  }
  table.appendChild(tbody);
}

/* ── Inspector ── */
function showInspector(cap, role, assignment) {
  const insp = document.getElementById('inspector');
  insp.classList.remove('empty');
  while (insp.firstChild) insp.removeChild(insp.firstChild);

  const fullCap = capMap[cap.id] || cap;

  const col1 = mk('div', 'insp-col');
  col1.style.maxWidth = '360px';
  col1.appendChild(mk('div', 'insp-cap-name', cap.name));
  col1.appendChild(mk('div', 'insp-desc', fullCap.description || ''));
  if ((fullCap.cmmc_controls || []).length) {
    col1.appendChild(mk('div', 'insp-lbl', 'CMMC 800-171 Controls'));
    const chips = mk('div', 'cmmc-chips');
    for (const c of fullCap.cmmc_controls) chips.appendChild(mk('span', 'cmmc-chip', c));
    col1.appendChild(chips);
  }
  insp.appendChild(col1);

  const col2 = mk('div', 'insp-col');
  col2.style.maxWidth = '220px';
  col2.appendChild(mk('div', 'insp-lbl', 'Role'));
  col2.appendChild(mk('div', 'insp-role', role.title));
  col2.appendChild(mk('div', 'insp-contact', role.department));
  if (role.person_name) {
    const pn = role.person_name + (role.person_title ? ' · ' + role.person_title : '');
    const pd = mk('div', 'insp-contact', pn);
    pd.style.marginTop = '6px';
    col2.appendChild(pd);
  }
  if (role.person_email) {
    const ed = mk('div', 'insp-contact');
    const a = mk('a', 'insp-email', role.person_email);
    a.href = 'mailto:' + role.person_email;
    ed.appendChild(a);
    col2.appendChild(ed);
  }
  insp.appendChild(col2);

  const col3 = mk('div', 'insp-col');
  col3.style.maxWidth = '220px';
  col3.appendChild(mk('div', 'insp-lbl', 'Responsibility'));
  const pill = mk('div', 'raci-pill ' + assignment.raci, assignment.raci + ' ');
  pill.appendChild(mk('span', 'raci-def', RACI_DEF[assignment.raci] || ''));
  col3.appendChild(pill);
  if (assignment.notes) {
    const n = mk('div', 'insp-contact', assignment.notes);
    n.style.marginTop = '8px';
    n.style.fontStyle = 'italic';
    col3.appendChild(n);
  }
  insp.appendChild(col3);
}

/* ── Export ── */
function exportPNG() {
  alert('Export PNG: use browser Print → Save as PDF, or take a screenshot.\n\nChrome: Ctrl+Shift+P → "Capture full size screenshot"');
}

/* ── Init ── */
function init() {
  const hc = document.getElementById('hdr-client');
  hc.textContent = D.client || 'Organization';
  const hm = document.getElementById('hdr-meta');
  const d = D.last_updated ? new Date(D.last_updated).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
  hm.textContent = 'v' + (D.version || '0.1.0') + (d ? ' · ' + d : '');
  renderBanner();
  renderRoles();
  renderMatrix();
}

init();
</script>
</body>
</html>
