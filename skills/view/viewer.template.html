<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsibility Matrix — CMMC</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273344;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-xs: #64748b;
      --accent: #818cf8;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,.4);
      --th-bg: #1a2844;
      --row-hover: #243049;
      --cat-opacity: 0.92;
      --header-bg: #0a1628;
      --header-client: #a5b4fc;
      --cell-border: #1e3050;
      --badge-p-bg: rgba(59,130,246,0.15);
      --badge-p-fg: #93c5fd;
      --badge-b-bg: rgba(245,158,11,0.15);
      --badge-b-fg: #fbbf24;
      --freq-daily-color: #cbd5e1;
      --link-color: #60a5fa;
      --active-all-bg: #3b4a6b;
      --toggle-bg: #1e293b;
      --toggle-border: #334155;
      --toggle-color: #94a3b8;
    }
    html[data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --text-xs: #94a3b8;
      --accent: #6366f1;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --th-bg: #f8fafc;
      --row-hover: #eef2ff;
      --cat-opacity: 1;
      --header-bg: #1e293b;
      --header-client: #c7d2fe;
      --cell-border: #f1f5f9;
      --badge-p-bg: #dbeafe;
      --badge-p-fg: #1d4ed8;
      --badge-b-bg: #fef3c7;
      --badge-b-fg: #92400e;
      --freq-daily-color: #1e293b;
      --link-color: #2563eb;
      --active-all-bg: #4f46e5;
      --toggle-bg: rgba(255,255,255,0.12);
      --toggle-border: rgba(255,255,255,0.2);
      --toggle-color: #c7d2fe;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    .app-header { background: var(--header-bg); color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 0; }
    .header-content { flex: 1; }
    .header-client { font-size: 13px; color: var(--header-client); font-weight: 500; margin-bottom: 4px; }
    .header-title { font-size: 16px; font-weight: 600; }
    .header-meta { font-size: 12px; color: #94a3b8; margin-top: 2px; }

    .theme-toggle {
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      color: var(--toggle-color);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.18); color: #fff; }
    .toggle-sun { display: inline; }
    .toggle-moon { display: none; }
    html[data-theme="light"] .toggle-sun { display: none; }
    html[data-theme="light"] .toggle-moon { display: inline; }

    .tab-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; }
    .tab-btn { padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-panel { display: none; padding: 24px; }
    .tab-panel.active { display: block; }

    .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted); transition: all .15s; }
    .filter-chip.active { color: #fff; border-color: transparent; }
    .filter-chip.chip-all-active { background: var(--active-all-bg); color: #fff; border-color: transparent; }
    .filter-chip:hover:not(.active):not(.chip-all-active) { border-color: #94a3b8; color: var(--text); }

    .matrix-wrap { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .matrix-table { width: 100%; border-collapse: collapse; }
    .matrix-table th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); background: var(--th-bg); border-bottom: 1px solid var(--border); white-space: nowrap; }
    .matrix-table td { padding: 12px 16px; border-bottom: 1px solid var(--cell-border); vertical-align: middle; }
    .matrix-table tr:last-child td { border-bottom: none; }
    .cap-row td { background: var(--surface); }
    .matrix-table tbody tr.cap-row:hover td { background: var(--row-hover); }
    .cat-row td { padding: 8px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #fff; opacity: var(--cat-opacity); }
    tr.hidden { display: none; }
    .cap-name { font-weight: 500; line-height: 1.3; }
    .cap-tool { font-size: 12px; color: var(--text-muted); margin-top: 3px; font-style: italic; }

    .role-cell { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .role-info-name { font-size: 13px; font-weight: 500; }
    .role-info-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .role-empty { color: var(--text-xs); font-size: 12px; font-style: italic; }

    .chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; color: #fff; }
    .chip-vpn    { background: #16a34a; }
    .chip-onprem { background: #64748b; }
    .chip-vdi    { background: #7c3aed; }
    .chip-cloud  { background: #2563eb; }

    .freq { font-size: 12px; font-weight: 500; white-space: nowrap; }
    .freq-oncall    { color: #f87171; font-weight: 700; }
    .freq-daily     { color: var(--freq-daily-color); }
    .freq-weekly    { color: #60a5fa; }
    .freq-monthly   { color: #a78bfa; }
    .freq-quarterly { color: #34d399; }
    .freq-annually  { color: var(--text-muted); }
    .freq-asneeded  { color: var(--text-xs); }

    .person-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }
    .person-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .person-card-hdr { padding: 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); }
    .person-av { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .pci-name { font-size: 15px; font-weight: 600; }
    .pci-sub  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .pci-dept { font-size: 12px; color: var(--text-xs); margin-top: 1px; }
    .pci-counts { margin-top: 6px; display: flex; gap: 6px; }
    .cnt-badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .cnt-primary { background: var(--badge-p-bg); color: var(--badge-p-fg); }
    .cnt-backup  { background: var(--badge-b-bg); color: var(--badge-b-fg); }
    .person-card-body { padding: 8px 16px 12px; max-height: 280px; overflow-y: auto; }
    .resp-item { padding: 7px 0; border-bottom: 1px solid var(--cell-border); }
    .resp-item:last-child { border-bottom: none; }
    .resp-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .resp-cap-name { font-size: 12px; font-weight: 500; }
    .badge-sm { padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .badge-sm-p { background: var(--badge-p-bg); color: var(--badge-p-fg); }
    .badge-sm-b { background: var(--badge-b-bg); color: var(--badge-b-fg); }
    .no-assign { padding: 10px 0; color: var(--text-xs); font-size: 12px; font-style: italic; }

    .dir-wrap { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .dir-table { width: 100%; border-collapse: collapse; }
    .dir-table th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); background: var(--th-bg); border-bottom: 1px solid var(--border); }
    .dir-table td { padding: 13px 16px; border-bottom: 1px solid var(--cell-border); font-size: 13px; vertical-align: middle; background: var(--surface); }
    .dir-table tr:last-child td { border-bottom: none; }
    .dir-pname { font-weight: 600; }
    .dir-psub  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .dir-email a { color: var(--link-color); text-decoration: none; font-size: 12px; }
    .dir-cnt { text-align: center; font-weight: 600; }
    .dim { color: var(--text-xs); font-style: italic; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <div id="hdr-client" class="header-client"></div>
    <div class="header-title">Information Security Responsibility Matrix</div>
    <div id="hdr-meta" class="header-meta"></div>
  </div>
  <button class="theme-toggle" id="theme-toggle" title="Toggle light / dark mode">
    <span class="toggle-sun">☀ Light</span>
    <span class="toggle-moon">☽ Dark</span>
  </button>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="matrix">Responsibility Matrix</button>
  <button class="tab-btn" data-tab="person">By Person</button>
  <button class="tab-btn" data-tab="directory">Personnel Directory</button>
</nav>

<div id="tab-matrix" class="tab-panel active">
  <div id="filter-bar" class="filter-bar"></div>
  <div class="matrix-wrap">
    <table class="matrix-table">
      <thead>
        <tr>
          <th style="width:28%">Responsibility</th>
          <th style="width:18%">Primary</th>
          <th style="width:18%">Backup</th>
          <th style="width:22%">Access Methods</th>
          <th style="width:14%">Frequency</th>
        </tr>
      </thead>
      <tbody id="matrix-body"></tbody>
    </table>
  </div>
</div>

<div id="tab-person" class="tab-panel">
  <div id="person-grid" class="person-grid"></div>
</div>

<div id="tab-directory" class="tab-panel">
  <div class="dir-wrap">
    <table class="dir-table">
      <thead>
        <tr>
          <th style="width:26%">Name / Role</th>
          <th style="width:20%">Department</th>
          <th style="width:28%">Email</th>
          <th style="width:13%" class="dir-cnt">Primary</th>
          <th style="width:13%" class="dir-cnt">Backup</th>
        </tr>
      </thead>
      <tbody id="dir-body"></tbody>
    </table>
  </div>
</div>

<script>
/* Read saved theme before first paint to avoid flash */
(function() {
  var saved = localStorage.getItem('cmmc-theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();

const D = { /* RACI_DATA_PLACEHOLDER */ };

var CAT_COLORS = {
  endpoint:   '#3b82f6',
  identity:   '#8b5cf6',
  vuln:       '#f97316',
  network:    '#06b6d4',
  cloud:      '#0ea5e9',
  data:       '#ef4444',
  monitoring: '#f59e0b',
  ir:         '#dc2626',
  governance: '#10b981',
  physical:   '#78716c'
};

var AV_COLORS = [
  '#4f46e5','#0891b2','#059669','#d97706','#dc2626',
  '#7c3aed','#0284c7','#16a34a','#ca8a04','#e11d48',
  '#0f766e','#b45309','#be185d','#1d4ed8','#7e22ce'
];

var ACCESS_CLS = { 'VPN':'chip-vpn', 'ON-PREM':'chip-onprem', 'VDI':'chip-vdi', 'CLOUD':'chip-cloud' };

var FREQ_CLS = {
  '24/7 On-Call':'freq-oncall',
  'Daily':'freq-daily',
  'Weekly':'freq-weekly',
  'Monthly':'freq-monthly',
  'Quarterly':'freq-quarterly',
  'Annually':'freq-annually',
  'As Needed':'freq-asneeded'
};

function mk(tag, cls) {
  var el = document.createElement(tag);
  if (cls) el.className = cls;
  return el;
}

function tx(tag, cls, val) {
  var el = mk(tag, cls);
  el.textContent = val != null ? String(val) : '';
  return el;
}

function avColor(id) {
  var h = 0;
  for (var i = 0; i < id.length; i++) h = ((h * 31) + id.charCodeAt(i)) | 0;
  return AV_COLORS[Math.abs(h) % AV_COLORS.length];
}

function initials(role) {
  var src = role.person_name || role.title;
  var words = src.trim().split(/\s+/);
  var out = '';
  for (var i = 0; i < words.length && out.length < 2; i++) {
    if (words[i] && /[A-Za-z]/.test(words[i][0])) out += words[i][0].toUpperCase();
  }
  return out || '?';
}

function roleById(id) {
  if (!id) return null;
  for (var i = 0; i < D.roles.length; i++) {
    if (D.roles[i].id === id) return D.roles[i];
  }
  return null;
}

function capById(id) {
  for (var i = 0; i < D.categories.length; i++) {
    var caps = D.categories[i].capabilities;
    for (var j = 0; j < caps.length; j++) {
      if (caps[j].id === id) return caps[j];
    }
  }
  return null;
}

function mkAvatar(role, cls, size) {
  var el = mk('div', cls || 'avatar');
  el.style.background = avColor(role.id);
  if (size) {
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.fontSize = Math.floor(size * 0.35) + 'px';
  }
  el.textContent = initials(role);
  return el;
}

function mkRoleCell(roleId) {
  var wrap = mk('div', 'role-cell');
  if (!roleId) { wrap.appendChild(tx('span', 'role-empty', '—')); return wrap; }
  var role = roleById(roleId);
  if (!role) { wrap.appendChild(tx('span', 'role-empty', roleId)); return wrap; }
  wrap.appendChild(mkAvatar(role, 'avatar', null));
  var info = mk('div', '');
  info.appendChild(tx('div', 'role-info-name', role.person_name || role.title));
  info.appendChild(tx('div', 'role-info-sub', role.person_name ? role.title : role.department));
  wrap.appendChild(info);
  return wrap;
}

function mkChips(methods) {
  var wrap = mk('div', 'chips');
  if (Array.isArray(methods)) {
    methods.forEach(function(m) {
      wrap.appendChild(tx('span', 'chip ' + (ACCESS_CLS[m] || ''), m));
    });
  }
  return wrap;
}

function mkFreq(freq) {
  return tx('span', 'freq ' + (FREQ_CLS[freq] || ''), freq || '—');
}

var activeCat = 'all';

function buildFilter() {
  var bar = document.getElementById('filter-bar');

  var allBtn = mk('button', 'filter-chip chip-all-active');
  allBtn.textContent = 'All';
  allBtn.setAttribute('data-cat', 'all');
  bar.appendChild(allBtn);

  D.categories.forEach(function(cat) {
    var btn = mk('button', 'filter-chip');
    btn.textContent = cat.name;
    btn.setAttribute('data-cat', cat.id);
    bar.appendChild(btn);
  });

  bar.addEventListener('click', function(e) {
    var btn = e.target.closest('.filter-chip');
    if (!btn) return;
    activeCat = btn.getAttribute('data-cat');
    applyFilter();
    bar.querySelectorAll('.filter-chip').forEach(function(c) {
      var catId = c.getAttribute('data-cat');
      var on = catId === activeCat;
      if (catId === 'all') {
        c.classList.toggle('chip-all-active', on);
        c.classList.remove('active');
        c.style.background = '';
        c.style.color = '';
        c.style.borderColor = '';
      } else {
        c.classList.remove('chip-all-active');
        c.classList.toggle('active', on);
        if (on) {
          c.style.background = CAT_COLORS[catId] || '';
          c.style.color = '#fff';
          c.style.borderColor = 'transparent';
        } else {
          c.style.background = '';
          c.style.color = '';
          c.style.borderColor = '';
        }
      }
    });
  });
}

function applyFilter() {
  document.getElementById('matrix-body').querySelectorAll('tr').forEach(function(r) {
    r.classList.toggle('hidden', activeCat !== 'all' && r.getAttribute('data-cat') !== activeCat);
  });
}

function buildMatrix() {
  var tbody = document.getElementById('matrix-body');
  var amap = {};
  D.assignments.forEach(function(a) { amap[a.capability_id] = a; });

  D.categories.forEach(function(cat) {
    var color = CAT_COLORS[cat.id] || '#64748b';

    var catRow = mk('tr', 'cat-row');
    catRow.setAttribute('data-cat', cat.id);
    catRow.style.background = color;
    var catTd = document.createElement('td');
    catTd.colSpan = 5;
    catTd.textContent = cat.name;
    catRow.appendChild(catTd);
    tbody.appendChild(catRow);

    cat.capabilities.forEach(function(cap) {
      var a = amap[cap.id] || null;
      var row = mk('tr', 'cap-row');
      row.setAttribute('data-cat', cat.id);

      var td1 = document.createElement('td');
      td1.appendChild(tx('div', 'cap-name', cap.name));
      if (a && a.tool_description) td1.appendChild(tx('div', 'cap-tool', a.tool_description));
      row.appendChild(td1);

      var td2 = document.createElement('td');
      td2.appendChild(mkRoleCell(a ? a.primary_role_id : null));
      row.appendChild(td2);

      var td3 = document.createElement('td');
      td3.appendChild(mkRoleCell(a ? a.backup_role_id : null));
      row.appendChild(td3);

      var td4 = document.createElement('td');
      td4.appendChild(mkChips(a ? a.access_methods : []));
      row.appendChild(td4);

      var td5 = document.createElement('td');
      td5.appendChild(mkFreq(a ? a.frequency : null));
      row.appendChild(td5);

      tbody.appendChild(row);
    });
  });
}

function buildByPerson() {
  var grid = document.getElementById('person-grid');

  D.roles.forEach(function(role) {
    var primList = D.assignments.filter(function(a) { return a.primary_role_id === role.id; });
    var backList = D.assignments.filter(function(a) { return a.backup_role_id  === role.id; });

    var card = mk('div', 'person-card');

    var hdr = mk('div', 'person-card-hdr');
    hdr.appendChild(mkAvatar(role, 'person-av', 52));

    var pci = mk('div', '');
    pci.appendChild(tx('div', 'pci-name', role.person_name || role.title));
    if (role.person_name) pci.appendChild(tx('div', 'pci-sub', role.title));
    pci.appendChild(tx('div', 'pci-dept', role.department));
    var counts = mk('div', 'pci-counts');
    counts.appendChild(tx('span', 'cnt-badge cnt-primary', primList.length + ' Primary'));
    counts.appendChild(tx('span', 'cnt-badge cnt-backup',  backList.length  + ' Backup'));
    pci.appendChild(counts);
    hdr.appendChild(pci);
    card.appendChild(hdr);

    var body = mk('div', 'person-card-body');
    var all = primList.map(function(a) { return {a:a, type:'p'}; })
                .concat(backList.map(function(a) { return {a:a, type:'b'}; }));

    if (all.length === 0) {
      body.appendChild(tx('p', 'no-assign', 'No responsibilities assigned'));
    } else {
      all.forEach(function(item) {
        var cap = capById(item.a.capability_id);
        var ri = mk('div', 'resp-item');
        var rh = mk('div', 'resp-hdr');
        rh.appendChild(tx('span', 'badge-sm ' + (item.type==='p' ? 'badge-sm-p' : 'badge-sm-b'),
                          item.type === 'p' ? 'PRIMARY' : 'BACKUP'));
        rh.appendChild(tx('span', 'resp-cap-name', cap ? cap.name : item.a.capability_id));
        ri.appendChild(rh);
        ri.appendChild(mkChips(item.a.access_methods));
        body.appendChild(ri);
      });
    }
    card.appendChild(body);
    grid.appendChild(card);
  });
}

function buildDirectory() {
  var tbody = document.getElementById('dir-body');
  D.roles.forEach(function(role) {
    var pc = D.assignments.filter(function(a) { return a.primary_role_id === role.id; }).length;
    var bc = D.assignments.filter(function(a) { return a.backup_role_id  === role.id; }).length;

    var row = document.createElement('tr');

    var td1 = document.createElement('td');
    if (role.person_name) {
      td1.appendChild(tx('div', 'dir-pname', role.person_name));
      td1.appendChild(tx('div', 'dir-psub', role.title));
    } else {
      td1.appendChild(tx('div', 'dir-pname dim', '— Unassigned —'));
      td1.appendChild(tx('div', 'dir-psub', role.title));
    }
    row.appendChild(td1);

    row.appendChild(tx('td', '', role.department));

    var td3 = document.createElement('td');
    td3.className = 'dir-email';
    if (role.person_email) {
      var a = document.createElement('a');
      a.href = 'mailto:' + role.person_email;
      a.textContent = role.person_email;
      td3.appendChild(a);
    } else {
      td3.appendChild(tx('span', 'dim', '—'));
    }
    row.appendChild(td3);

    row.appendChild(tx('td', 'dir-cnt', String(pc)));
    row.appendChild(tx('td', 'dir-cnt', String(bc)));
    tbody.appendChild(row);
  });
}

function buildHeader() {
  document.title = D.client + ' — Responsibility Matrix';
  document.getElementById('hdr-client').textContent = D.client;
  var d = new Date(D.last_updated);
  var ds = isNaN(d.getTime()) ? D.last_updated :
    d.toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
  document.getElementById('hdr-meta').textContent = 'v' + D.version + '  ·  ' + ds;
}

document.getElementById('theme-toggle').addEventListener('click', function() {
  var html = document.documentElement;
  var cur = html.getAttribute('data-theme') || 'dark';
  var next = cur === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('cmmc-theme', next);
});

document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var t = btn.getAttribute('data-tab');
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b===btn); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.toggle('active', p.id==='tab-'+t); });
  });
});

buildHeader();
buildFilter();
buildMatrix();
buildByPerson();
buildDirectory();
</script>
</body>
</html>
